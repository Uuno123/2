<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maksu peruutettu</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1c1818;
      font-family: 'Archivo', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: float 8s ease-in-out infinite;
    }
    .blob-1 { width: 420px; height: 420px; background: #5a1a1a; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 340px; height: 340px; background: #3a1515; bottom: -80px; right: -80px; animation-delay: 3s; }
    .blob-3 { width: 260px; height: 260px; background: #2a1010; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.05); }
      66%       { transform: translate(-20px, 15px) scale(0.97); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      padding: 56px 64px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .x-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, #6b2020, #3a1010);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: checkBounce 0.8s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      box-shadow: 0 0 40px rgba(120, 30, 30, 0.5);
    }
    @keyframes checkBounce {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }
    .x-wrap svg { width: 44px; height: 44px; }

    .title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 42px;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .title span {
      background: linear-gradient(90deg, #cc4444, #aa2222);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 18px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
      text-align: left;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px 18px;
      animation: slideIn 0.5s ease both;
    }
    .step:nth-child(1) { animation-delay: 0.5s; }
    .step:nth-child(2) { animation-delay: 0.65s; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .step-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(150, 40, 40, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
    }
    .step-text { flex: 1; }
    .step-label {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .step-value {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.5s 0.9s ease both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #FF4B3E, #ff6a1a);
      color: white;
      text-decoration: none;
      font-family: 'Archivo Black', sans-serif;
      font-size: 17px;
      padding: 16px 36px;
      border-radius: 14px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 30px rgba(255,75,62,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(255,75,62,0.5); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-family: 'Archivo', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.10); transform: translateY(-1px); }
    .btn-secondary:active { transform: translateY(0); }

    .btn-primary svg, .btn-secondary svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<div class="bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="card">
  <div class="x-wrap">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="14" y1="14" x2="34" y2="34" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round"/>
      <line x1="34" y1="14" x2="14" y2="34" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </div>

  <h1 class="title">Maksu <span>peruutettu</span></h1>
  <p class="subtitle">Maksua ei veloitettu. Voit yrittää uudelleen tai palata etusivulle.</p>

  <div class="steps">
    <div class="step">
      <div class="step-icon">🛒</div>
      <div class="step-text">
        <div class="step-label">Ostoskori</div>
        <div class="step-value">Tuotteesi odottavat vielä</div>
      </div>
    </div>
    <div class="step">
      <div class="step-icon">💳</div>
      <div class="step-text">
        <div class="step-label">Maksu</div>
        <div class="step-value">Ei veloituksia tehty</div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <a href="ostoskori.html" class="btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4h3l2.5 10h11L20 7H6"/>
        <circle cx="9" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
      </svg>
      Yritä uudelleen
    </a>
    <a href="index.html" class="btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Takaisin etusivulle
    </a>
  </div>
</div>

</body>
</html>
